# wrangler.toml
# Un archivo por cada frontend. Cambia "name" para que sea único por app
# (ej: web-ssr-1, web-ssr-2, web-cliente).
# Docs: https://opennext.js.org/cloudflare/get-started

name = "gssc-frontend"
main = ".open-next/worker.js"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Sirve los assets estáticos generados por OpenNext
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Dominio propio. La zona glam-urban.dev debe estar activa en esta cuenta CF.
# custom_domain = true hace que CF cree el registro DNS y el cert TLS solo.
routes = [
  { pattern = "gssc.glam-urban.dev", custom_domain = true }
]

# ─────────────────────────────────────────────────────────────────────
# Variables de RUNTIME no sensibles de ESTE ambiente (pruebas).
# Reglas:
#   - SECRETS (SESSION_SECRET, *_CLIENT_SECRET, *_API_KEY, SERVICE_ROLE_KEY)
#     NO van aquí -> usar `wrangler secret put` o el dashboard (cifrados).
#   - NEXT_PUBLIC_* tampoco van aquí -> se inyectan en BUILD (GitHub Actions).
# Valores del ambiente de pruebas (default).
# ─────────────────────────────────────────────────────────────────────
[vars]
SUPABASE_URL        = "https://jwlnlxxoooelfdfvidfx.supabase.co"
BACKEND_API_URL     = "https://jwlnlxxoooelfdfvidfx.supabase.co/rest/v1/"
BACKEND_DB_SCHEMA   = "gssc_db"
COOKIE_DOMAIN       = ".glam-urban.dev"          # sesión entre subdominios
GOOGLE_CLIENT_ID    = "385215853597-fujcjrfsa7t5rbe2unvnb9r0v382l648.apps.googleusercontent.com"
MICROSOFT_CLIENT_ID = "48205c3a-d308-4022-b21d-594114bf1594"
# META_APP_ID       = ""           # añadir si se activa login con Meta/Facebook

# ─────────────────────────────────────────────────────────────────────
# AMBIENTES futuros (pruebas / producción).
# Cada `[env.<x>]` necesita su propio `name`, sus `[env.<x>.vars]`, y sus
# secrets cargados por ambiente:
#   wrangler secret put SESSION_SECRET --env production
#   npm run cf:deploy -- --env production
# El ambiente por defecto (sin --env) es esta config de arriba (pruebas).
# ─────────────────────────────────────────────────────────────────────
# [env.staging]
# name = "gssc-frontend-staging"
# [env.staging.vars]
# SUPABASE_URL = ""
#
# [env.production]
# name = "gssc-frontend-production"
# [env.production.vars]
# SUPABASE_URL = ""
