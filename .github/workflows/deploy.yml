name: Deploy frontend (Cloudflare)

# main -> PRODUCCIÓN (worker -prod, dominio .com) | develop -> DEV (worker default, dominio .dev)
on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Resuelve vars/secrets del GitHub Environment según la rama
    environment: ${{ github.ref_name == 'main' && 'production' || 'dev' }}
    # Necesario para que npm ci pueda leer @glammer-admin/gssc-authn de GitHub Packages
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # wrangler/miniflare requieren Node >= 22; usamos 24 para igualar el entorno local
          node-version: 24
          cache: npm

      # El .npmrc usa ${NODE_AUTH_TOKEN} para el scope @glammer-admin (GitHub Packages)
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Construye Next.js para Cloudflare Workers (OpenNext)
      # Las NEXT_PUBLIC_* se "hornean" en el bundle EN BUILD -> deben estar aquí.
      # Defínelas como GitHub repo "vars" (Settings -> Secrets and variables -> Actions -> Variables).
      # NO pongas secrets aquí: los secrets de runtime van en el Worker (wrangler secret / dashboard).
      - run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_APP_ENV: ${{ vars.NEXT_PUBLIC_APP_ENV }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_PRODUCTION_URL: ${{ vars.NEXT_PUBLIC_PRODUCTION_URL }}
          NEXT_PUBLIC_STAGING_URL: ${{ vars.NEXT_PUBLIC_STAGING_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ORCHESTRATOR_URL: ${{ vars.NEXT_PUBLIC_ORCHESTRATOR_URL }}
          NEXT_PUBLIC_GLAMFORGE_URL: ${{ vars.NEXT_PUBLIC_GLAMFORGE_URL }}
          NEXT_PUBLIC_ONLINE_EDITOR_URL: ${{ vars.NEXT_PUBLIC_ONLINE_EDITOR_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${{ vars.NEXT_PUBLIC_MICROSOFT_CLIENT_ID }}

      - name: Deploy a Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy ${{ github.ref_name == 'main' && '--env production' || '' }}
